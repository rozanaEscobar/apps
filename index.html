<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rozana Escobar · Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background-image:url('fundo-rosa.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
  padding:1.5rem 1rem 3rem;
  color:#1a1a2e;
}
.page{max-width:1280px;margin:0 auto}
.hero{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:1.2rem 1.4rem;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,100,200,0.4);border-radius:20px;flex-wrap:wrap}
.avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid #ff4da6;flex-shrink:0}
.hero-text{flex:1;min-width:180px}
.hero-text h1{font-size:1.3rem;font-weight:800;color:#4a003f}
.hero-text p{font-size:0.85rem;color:#ff4da6;margin-top:4px}
.cbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-size:0.8rem;font-weight:700;text-decoration:none;color:#fff}
.cbtn-ig{background:#f97316}
.cbtn-tg{background:#2ca5e0}
.cbtn-wa{background:#25d366}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:28px;
  padding:10px 0;
}
.card{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,100,200,0.4);
  border-radius:22px;
  padding:24px;
  text-align:center;
  box-shadow:0 12px 35px rgba(0,0,0,0.1);
  transition:all 0.3s;
}
.card:hover{
  transform:translateY(-12px);
  box-shadow:0 25px 50px rgba(255,77,166,0.25);
}
.card-title{font-size:1.2rem;font-weight:800;color:#4a003f;margin-bottom:6px}
.card-sub{font-size:0.85rem;color:#555;margin-bottom:18px}
.price{font-size:1.35rem;font-weight:800;color:#f97316;margin:12px 0}
.btn{
  background:linear-gradient(45deg, #ff4da6, #9b4dff);
  color:white;
  padding:16px 32px;
  border:none;
  border-radius:50px;
  font-size:1.05rem;
  font-weight:700;
  width:100%;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(255,77,166,0.35);
}
.btn:hover{
  background:linear-gradient(45deg, #9b4dff, #ff4da6);
  transform:scale(1.05);
}
.section-label{font-size:0.75rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#4a003f;margin:1.4rem 0 0.8rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,77,166,0.4)}
.canais-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.canal-card{background:rgba(255,255,255,0.9);border:1px solid rgba(255,100,200,0.4);border-radius:18px;padding:1.4rem;text-decoration:none;color:inherit;transition:0.3s}
.canal-card:hover{transform:translateY(-5px)}
.bonus-panel{background:rgba(255,255,255,0.9);border:1px solid rgba(255,100,200,0.4);border-radius:18px;padding:1.4rem}
</style>
</head>
<body>
<div class="page">

<div class="hero">
<img class="avatar" src="rozana.jpg">
<div class="hero-text">
<h1>Rozana Escobar</h1>
<p>Aplicativos anuais · IA na prática · Ferramentas</p>
</div>
</div>

<div class="section-label">📌 Aplicativos anuais</div>
<div class="product-grid">

<div class="card">
<div class="card-title">🎨 Canva Pro</div>
<div class="card-sub">Pix ou cartão</div>
<div class="price">R$ 47/ano</div>
<button class="btn">Comprar Agora</button>
</div>

</div>

</div>
</body>
</html>
