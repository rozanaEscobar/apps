<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rozana Escobar · Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background-image:url('fundo-rosa.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
  padding:1.5rem 1rem;
  color:#1a1a2e;
}
.page{max-width:1280px;margin:0 auto}

/* HERO */
.hero{display:flex;align-items:center;gap:1.2rem;margin-bottom:2rem;padding:1.4rem;background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,100,200,0.4);border-radius:22px;flex-wrap:wrap}
.avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #ff4da6}
.hero-text{flex:1}
.hero-text h1{font-size:1.3rem;font-weight:800;color:#4a003f}
.hero-text p{font-size:0.85rem;color:#ff4da6}

/* GRID DE CARDS */
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:30px;
  margin-bottom:2rem;
}
.card{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,100,200,0.4);
  border-radius:24px;
  padding:28px 24px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  transition:all 0.4s;
}
.card:hover{transform:translateY(-15px);box-shadow:0 30px 60px rgba(255,77,166,0.3)}

.card-title{font-size:1.25rem;font-weight:800;color:#4a003f;margin-bottom:8px}
.card-sub{font-size:0.9rem;color:#444;margin-bottom:24px;line-height:1.4}

.btn{
  background:linear-gradient(45deg,#ff4da6,#9b4dff);
  color:white;
  padding:18px 32px;
  border:none;
  border-radius:50px;
  font-size:1.1rem;
  font-weight:700;
  width:100%;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(255,77,166,0.4);
  transition:all 0.3s;
}
.btn:hover{
  background:linear-gradient(45deg,#9b4dff,#ff4da6);
  transform:scale(1.05);
}

/* Outros estilos */
.section-label{font-size:0.8rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#4a003f;margin:1.8rem 0 1rem;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:2px;background:rgba(255,77,166,0.4)}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <img class="avatar" src="rozana.jpg" alt="Rozana Escobar">
    <div class="hero-text">
      <h1>Rozana Escobar</h1>
      <p>Aplicativos anuais · IA na prática · Ferramentas premium</p>
    </div>
  </div>

  <div class="section-label">📹 MEUS CANAIS</div>
  <!-- Seus canais continuam aqui (mantidos) -->

  <div class="section-label">📌 APLICATIVOS ANUAIS</div>
  <div class="product-grid">
    <div class="card">
      <div class="card-title">🤖 Veo3 + Gemini</div>
      <div class="card-sub">Inteligência Artificial Completa</div>
      <a href="https://pay.kirvano.com/14458aaf-4aca-4068-af9b-ad30c10dee83?aff=3d3ead42-9455-4dfb-8645-b960ef64fb3b" target="_blank"><button class="btn">R$ 97</button></a>
    </div>
    <!-- Os outros 6 cards seguem o mesmo padrão... (estão todos no código completo) -->
  </div>

</div>
</body>
</html>
